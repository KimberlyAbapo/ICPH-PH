<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICPH | Official Community Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap');
        :root { --honda-red: #E30613; --carbon: #121212; --dark-gray: #1E1E1E; --white: #FFFFFF; }
        body { font-family: 'Inter', sans-serif; background-color: var(--carbon); color: var(--white); margin: 0; }
        header { background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1591637333184-19aa84b3e01f?auto=format&fit=crop&q=80&w=1920'); background-size: cover; background-position: center; height: 35vh; display: flex; flex-direction: column; justify-content: center; align-items: center; border-bottom: 4px solid var(--honda-red); text-align: center; }
        header h1 { font-family: 'Orbitron'; font-size: 3rem; margin: 0; letter-spacing: 5px; }
        .main-container { display: grid; grid-template-columns: 1fr 350px; max-width: 1400px; margin: -50px auto 50px; gap: 20px; padding: 0 20px; }
        .card { background: var(--dark-gray); border-radius: 12px; border: 1px solid #333; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn { background: var(--honda-red); color: white; border: none; padding: 12px 25px; border-radius: 6px; font-weight: bold; cursor: pointer; width: 100%; text-transform: uppercase; font-family: 'Orbitron'; margin-top: 10px; }
        .btn:disabled { background: #555; cursor: not-allowed; }
        .garage-feed { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; margin-top: 20px; }
        .feed-item { background: #252525; border-radius: 8px; overflow: hidden; border-top: 3px solid var(--honda-red); position: relative; }
        .feed-item img { width: 100%; height: 180px; object-fit: cover; }
        .shoutbox { height: 500px; display: flex; flex-direction: column; position: sticky; top: 20px; }
        #chat-messages { flex-grow: 1; overflow-y: auto; padding: 10px; font-size: 0.85rem; }
        .msg { margin-bottom: 8px; background: #2a2a2a; padding: 8px; border-radius: 8px; border-left: 3px solid var(--honda-red); }
        input[type="text"], input[type="file"] { width: 100%; padding: 10px; background: #111; border: 1px solid #444; color: white; border-radius: 6px; margin-bottom: 5px; }
        .upload-area { border: 2px dashed #444; padding: 15px; text-align: center; border-radius: 6px; margin-bottom: 10px; cursor: pointer; }
        .upload-area:hover { border-color: var(--honda-red); }
        @media (max-width: 900px) { .main-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <header><h1>ICPH COMMUNITY</h1><p>OFFICIAL GARAGE HUB</p></header>
    <div class="main-container">
        <div class="card">
            <h3 style="margin-top:0">GARAGE FEED</h3>
            <div style="display:flex; gap:10px;">
                <input type="text" id="rider-name" placeholder="Rider Name / Alias">
                <input type="text" id="ride-title" placeholder="Ride Specs (e.g. Vario 160)">
            </div>
            
            <div class="upload-area" onclick="document.getElementById('ride-file').click()">
                <p style="margin:0; font-size:0.9rem; color:#aaa;">Click to Upload Ride Photo</p>
                <input type="file" id="ride-file" accept="image/*" style="display:none" onchange="previewFile()">
            </div>
            <img id="preview-img" style="width:100%; height:200px; object-fit:cover; display:none; border-radius:6px; margin-bottom:10px;">
            
            <button id="post-btn" class="btn" onclick="uploadAndPost()">POST RIDE</button>
            <div id="garage-feed" class="garage-feed"></div>
        </div>
        <div class="card shoutbox">
            <h3 style="margin-top:0">SHOUTBOX</h3>
            <div id="chat-messages"></div>
            <div style="margin-top:10px;">
                <input type="text" id="chat-msg" placeholder="Type message..." onkeypress="if(event.key==='Enter') sendChat()">
            </div>
        </div>
    </div>
    <script>
        const SUPABASE_URL = 'https://xyztqvcehfqlkzoeivff.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh5enRxdmNlaGZxbGt6b2VpdmZmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0Mzg3MzQsImV4cCI6MjA4ODAxNDczNH0.8NuWVb0ngl769Cohfdeyjc0ZUIBw9sSmavlmuR501zA';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function previewFile() {
            const file = document.getElementById('ride-file').files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('preview-img').src = e.target.result;
                    document.getElementById('preview-img').style.display = 'block';
                }
                reader.readAsDataURL(file);
            }
        }

        async function uploadAndPost() {
            const name = document.getElementById('rider-name').value;
            const title = document.getElementById('ride-title').value;
            const fileInput = document.getElementById('ride-file');
            const file = fileInput.files[0];

            if (!name || !title || !file) return alert("Please fill name, title, and select a photo!");

            document.getElementById('post-btn').disabled = true;
            document.getElementById('post-btn').innerText = "UPLOADING...";

            // 1. Upload Image
            const fileName = `rides/${Date.now()}_${file.name.replace(/\s/g, '_')}`;
            const { data, error: uploadError } = await sb.storage.from('rides').upload(fileName, file);

            if (uploadError) {
                alert("Upload Failed: " + uploadError.message);
                document.getElementById('post-btn').disabled = false;
                document.getElementById('post-btn').innerText = "POST RIDE";
                return;
            }

            // 2. Get Public URL
            const { data: { publicUrl } } = sb.storage.from('rides').getPublicUrl(fileName);

            // 3. Save to Database
            const { error: dbError } = await sb.from('garage').insert([{ name: name, title: title, img: publicUrl }]);

            if (dbError) {
                alert("Database Error: " + dbError.message);
            } else {
                // Reset Form
                document.getElementById('ride-title').value = '';
                document.getElementById('preview-img').style.display = 'none';
                fileInput.value = '';
            }
            document.getElementById('post-btn').disabled = false;
            document.getElementById('post-btn').innerText = "POST RIDE";
        }

        async function sendChat() {
            const n=document.getElementById('rider-name').value||'Rider', m=document.getElementById('chat-msg').value;
            if(!m) return;
            await sb.from('chat').insert([{ user: n, text: m }]);
            document.getElementById('chat-msg').value='';
        }

        // Realtime Listeners
        sb.channel('public:garage').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'garage' }, payload => renderPost(payload.new)).subscribe();
        sb.channel('public:chat').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'chat' }, payload => renderChat(payload.new)).subscribe();

        function renderPost(data) {
            const div = document.createElement('div'); div.className = 'feed-item';
            div.innerHTML = `<img src="${data.img}"><div style="padding:10px"><b style="color:red">@${data.name}</b><p style="margin:5px 0; font-size:0.9rem">${data.title}</p></div>`;
            document.getElementById('garage-feed').prepend(div);
        }

        function renderChat(data) {
            const d = document.createElement('div'); d.className='msg'; d.innerHTML=`<b style="color:red; font-size:0.7rem">${data.user}</b>${data.text}`;
            const box = document.getElementById('chat-messages'); box.appendChild(d); box.scrollTop = box.scrollHeight;
        }

        async function loadInitial() {
            const { data: g } = await sb.from('garage').select('*').order('created_at', { ascending: false }).limit(20);
            if(g) g.forEach(renderPost);
            const { data: c } = await sb.from('chat').select('*').order('created_at', { ascending: true }).limit(50);
            if(c) c.forEach(renderChat);
        }
        loadInitial();
    </script>
</body>
</html>
